name: Daily IPMA snapshot

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install
        run: pip install -e .
      - name: Ingest and rebuild
        run: python -m src.pipeline run-all --ipma-areas 7 3
        env:
          MEMORIA_USER_AGENT: MEMORIA-Seismic-Observatory/0.1 GitHub-Actions
      - name: Commit snapshot
        run: |
          git config user.name "memoria-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/bronze data/silver data/gold reports/latest_report.md
          git diff --cached --quiet || git commit -m "data: daily IPMA snapshot"
          git push
